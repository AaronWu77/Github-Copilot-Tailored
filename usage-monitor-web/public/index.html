<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usage Monitor Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Usage Monitor Prototype</p>
          <h1>Provider Usage / Billing 监控面板</h1>
          <p class="subtitle">
            独立于现有 Copilot API 启动脚本的初版面板。它只读取本地 env，并轮询你额外配置的 usage / billing 接口。
          </p>
        </div>
        <div class="actions">
          <button id="refresh-button" type="button">立即刷新</button>
        </div>
      </header>

      <section class="summary" id="summary-cards"></section>

      <section class="panel">
        <div class="panel-header">
          <h2>配置来源 / 当前系统</h2>
        </div>
        <div id="config-meta" class="config-meta"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Provider 状态</h2>
        </div>
        <div id="provider-grid" class="provider-grid"></div>
      </section>
    </main>

    <template id="provider-card-template">
      <article class="provider-card">
        <div class="provider-card-header">
          <div>
            <h3 class="provider-name"></h3>
            <p class="provider-model"></p>
          </div>
          <span class="status-chip"></span>
        </div>

        <dl class="metrics-grid">
          <div>
            <dt>Base URL</dt>
            <dd class="provider-base-url"></dd>
          </div>
          <div>
            <dt>Env 文件</dt>
            <dd class="provider-env-file"></dd>
          </div>
          <div>
            <dt>Usage 来源</dt>
            <dd class="provider-source-usage"></dd>
          </div>
          <div>
            <dt>Balance 来源</dt>
            <dd class="provider-source-balance"></dd>
          </div>
        </dl>

        <h4>Usage</h4>
        <dl class="metrics-grid">
          <div>
            <dt>总 Token</dt>
            <dd class="metric-usage-total">-</dd>
          </div>
          <div>
            <dt>输入 Token</dt>
            <dd class="metric-usage-prompt">-</dd>
          </div>
          <div>
            <dt>输出 Token</dt>
            <dd class="metric-usage-completion">-</dd>
          </div>
          <div>
            <dt>请求数</dt>
            <dd class="metric-usage-request-count">-</dd>
          </div>
          <div>
            <dt>最近更新</dt>
            <dd class="metric-usage-updated-at">-</dd>
          </div>
        </dl>

        <h4>Balance</h4>
        <dl class="metrics-grid">
          <div>
            <dt>可用状态</dt>
            <dd class="metric-balance-available">-</dd>
          </div>
          <div>
            <dt>币种</dt>
            <dd class="metric-balance-currency">-</dd>
          </div>
          <div>
            <dt>总余额</dt>
            <dd class="metric-balance-total">-</dd>
          </div>
          <div>
            <dt>赠金余额</dt>
            <dd class="metric-balance-granted">-</dd>
          </div>
          <div>
            <dt>充值余额</dt>
            <dd class="metric-balance-topped-up">-</dd>
          </div>
          <div>
            <dt>余额条目数</dt>
            <dd class="metric-balance-entry-count">-</dd>
          </div>
          <div>
            <dt>最近检查</dt>
            <dd class="metric-balance-checked-at">-</dd>
          </div>
        </dl>

        <div class="message-block">
          <p class="usage-message"></p>
          <p class="usage-details"></p>
          <p class="balance-message"></p>
          <p class="balance-details"></p>
          <ul class="warning-list"></ul>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
